name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: JoseAfonsoCunhaConceicao
          template: classic
          # Retiramos metadata, community e repositories. Fica apenas o essencial:
          base: header
          # Foco total nas linguagens de programação:
          plugin_languages: yes
          plugin_languages_categories: programming
          plugin_languages_colors: github
          plugin_languages_limit: 5
          plugin_languages_details: percentage
          # Ignorar código de forks (para mostrar apenas código escrito por ti)
          repositories_forks: no
          config_timezone: Europe/Lisbon
